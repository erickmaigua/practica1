<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Sugerencias</title>

    </head>
    <body>
        <header>
            <h1>Sugerencias</h1>
        </header>
        <main>
            <form action="../resultados/resultados.html" method="get">
                <label for="email">Correo Electrónico:</label>
                 <br><br>
                <input type="email" id="email" name="email" placeholder="corre@ejemplo.com" required>
                 <br><br>
                <label for = "sugerencia">Sugerencia:</label>
                 <br><br>
                <textarea  id="sugerencia" name="sugerencia" placeholder="Escriba su sugerencia" required rows="4" cols="40" ></textarea>
                 <br><br>
                <button type="submit">Enviar Sugerencia</button>
            </form>
        </main>
    </body>

</html>
